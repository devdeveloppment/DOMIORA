{% extends "base.html" %}
{% block content %}
<section class="min-h-[60vh] grid place-items-center py-16 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-card border border-gray-100 p-8">
    <h1 class="text-2xl font-extrabold text-center">Mot de passe oublié</h1>
    <p class="text-gray-500 text-sm text-center mt-1">Saisissez votre e-mail pour recevoir un lien de réinitialisation.</p>
    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      {{ form.email }}
      <button type="submit" class="w-full bg-primary-600 hover:bg-primary-500 transition text-white font-semibold rounded-full px-4 py-3">Envoyer le lien</button>
    </form>
  </div>
</section>
{% endblock %}
{% block extra_scripts %}
<script>document.getElementById('id_email').classList.add('mt-1','w-full','rounded-lg','border','border-gray-200','px-3','py-2.5','text-sm');</script>
{% endblock %}
